<!doctype html>
<html lang="ja">
  <head>
    <!-- 文字コード指定　UTF−8を指定 -->
    <meta charset="UTF-8" />
    <!-- スマホやタブレットでも綺麗に表示する「レスポンシブ表示」のための記述 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- サイトのアイコン -->
    <link rel="shortcut icon" href="./img/favicon.ico" type="image/x-icon" />
    <!-- Appleタッチアイコン -->
    <link rel="apple-touch-icon" href="./img/favicon.ico" type="image/x-icon" />
    <!-- 検索にヒットしないようにするための記述 -->
    <!-- あとでnoindexをきちんと確認する（公開時） -->
    <meta name="robots" content="noindex" />
    <!-- サイトタイトル -->
    <title>テスト</title>
    <!-- サイトの説明文 -->
    <!-- あとでdescriptionをきちんと確認する（公開時） -->
    <meta name="description" content="サイトの概要を記入します" />
    <!-- Google　Fontsを読み込む -->
    <!-- スタイルシートの読み込み -->
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body></body>
</html>
